<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pack.mcmeta Builder | PackZone MC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#050b18;
    color:white;
}


.container{
    max-width:1000px;
    margin:auto;
    padding:25px;
}


h1{
    text-align:center;
    color:#00aaff;
    text-shadow:0 0 20px #008cff;
}


.card{

    background:#0d2038;
    padding:25px;
    margin:20px 0;
    border-radius:20px;
    box-shadow:0 0 20px #002b55;

}


h2{

    color:#7ec8ff;

}


input,select{

    width:100%;
    padding:12px;
    background:#050b18;
    color:white;
    border:1px solid #008cff;
    border-radius:12px;

}



.icon-box{

    width:150px;
    height:150px;
    margin-top:15px;
    background:#000;
    border-radius:15px;
    overflow:hidden;

}


.icon-box img{

    width:100%;
    height:100%;
    object-fit:cover;

}



.tools{

    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:15px;

}



.tools button{

    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    background:#102847;

}


.tools button:hover{

    transform:scale(1.05);

}


.editor{

    min-height:80px;
    padding:15px;
    background:#050b18;
    border:1px solid #008cff;
    border-radius:15px;
    outline:none;

}



.preview{

    text-align:center;
    background:#111;
    padding:20px;
    border-radius:15px;

}


.preview img{

    width:100px;
    height:100px;
    border-radius:15px;

}



pre{

    background:#02050a;
    color:#7ec8ff;
    padding:20px;
    border-radius:15px;
    overflow:auto;

}



.download button{

    background:#075ca8;
    color:white;
    border:none;
    padding:15px 20px;
    border-radius:15px;
    cursor:pointer;
    margin:5px;

}


.download button:hover{

    background:#008cff;

}


</style>

</head>


<body>


<div class="container">


<h1>📦 Pack.mcmeta Builder</h1>


<section class="card">

<h2>🖼 Pack Icon</h2>

<input type="file" id="iconInput" accept="image/*">


<div class="icon-box">

<img id="iconPreview">

</div>


</section>



<section class="card">

<h2>📦 اسم پک</h2>


<div class="tools" id="nameTools">

</div>


<div id="packName" class="editor" contenteditable="true">

PZMC Pack

</div>


</section>
<section class="card">

<h2>🎮 نسخه Minecraft</h2>

<select id="version">

<option value="1">1.8 - 1.8.9</option>
<option value="3">1.12.2</option>
<option value="4">1.13 - 1.14.4</option>
<option value="5">1.15 - 1.16.1</option>
<option value="6">1.16.2 - 1.16.5</option>
<option value="7">1.17 - 1.17.1</option>
<option value="8">1.18 - 1.18.2</option>
<option value="9">1.19</option>
<option value="12">1.19.3</option>
<option value="15">1.20 - 1.20.1</option>
<option value="18">1.20.5 - 1.20.6</option>
<option value="34">1.21+</option>

</select>


</section>



<section class="card">

<h2>📝 توضیحات پک</h2>


<div class="tools" id="descTools">

</div>


<div id="description" class="editor" contenteditable="true">

Official PackZone MC Pack

</div>


</section>




<section class="card">

<h2>👀 پیش نمایش</h2>


<div class="preview">


<img id="previewIcon">


<h3 id="previewName">
PZMC Pack
</h3>


<p id="previewDescription">
Official PackZone MC Pack
</p>


</div>


</section>




<section class="card">

<h2>📄 pack.mcmeta</h2>


<pre id="json">

{
 "pack":{
  "pack_format":1,
  "description":"PackZone MC"
 }
}

</pre>


</section>



<section class="card download">


<button onclick="downloadMcmeta()">
📄 دانلود pack.mcmeta
</button>


<button onclick="downloadPack()">
📦 دانلود pack.mcmeta + pack.png
</button>


</section>



</div>


<script>
let iconData = "";


/* رنگ ها */

const colors = [

["§0","#000000"],
["§1","#0000aa"],
["§2","#00aa00"],
["§3","#00aaaa"],
["§4","#aa0000"],
["§5","#aa00aa"],
["§6","#ffaa00"],
["§7","#aaaaaa"],
["§8","#555555"],
["§9","#5555ff"],
["§a","#55ff55"],
["§b","#55ffff"],
["§c","#ff5555"],
["§d","#ff55ff"],
["§e","#ffff55"],
["§f","#ffffff"]

];



function createTools(id,type){


let box=document.getElementById(id);


colors.forEach(function(c){


let btn=document.createElement("button");

btn.innerHTML=c[0];

btn.style.background=c[1];


btn.onclick=function(){

insertCode(type,c[0]);

};


box.appendChild(btn);


});



let styles=[

["B","§l"],
["I","§o"],
["U","§n"],
["S","§m"],
["✨","§k"],
["Reset","§r"]

];


styles.forEach(function(s){


let btn=document.createElement("button");

btn.innerHTML=s[0];

btn.onclick=function(){

insertCode(type,s[1]);

};


box.appendChild(btn);


});


}



createTools("nameTools","name");

createTools("descTools","desc");





let activeEditor = document.getElementById("packName");



document.querySelectorAll(".editor").forEach(function(e){


e.onclick=function(){

activeEditor=this;

}


});

function insertCode(type,code){

if(type==="name"){
    activeEditor=document.getElementById("packName");
}

if(type==="desc"){
    activeEditor=document.getElementById("description");
}

activeEditor.innerText += code;

activeEditor.focus();

update();

}








/* آیکون */


document.getElementById("iconInput").onchange=function(e){


let file=e.target.files[0];


if(file){


let reader=new FileReader();


reader.onload=function(ev){


iconData=ev.target.result;


document.getElementById("iconPreview").src=iconData;

document.getElementById("previewIcon").src=iconData;


};


reader.readAsDataURL(file);


}


};
function getText(id){

return document.getElementById(id).innerText;

}



function convertColor(text){

let map = {
"0":"#000000",
"1":"#0000aa",
"2":"#00aa00",
"3":"#00aaaa",
"4":"#aa0000",
"5":"#aa00aa",
"6":"#ffaa00",
"7":"#aaaaaa",
"8":"#555555",
"9":"#5555ff",
"a":"#55ff55",
"b":"#55ffff",
"c":"#ff5555",
"d":"#ff55ff",
"e":"#ffff55",
"f":"#ffffff"
};

let color="#ffffff";

text=text.replace(/§([0-9a-f])/g,function(match,c){
    color=map[c];
    return `</span><span style="color:${color}">`;
});

text=text.replace(/§l/g,"<b>");
text=text.replace(/§o/g,"<i>");
text=text.replace(/§n/g,"<u>");
text=text.replace(/§m/g,"<s>");
text=text.replace(/§r/g,"</span></b></i></u></s>");

return `<span style="color:${color}">${text}</span>`;

}
function update(){


let name=getText("packName");

let desc=getText("description");

let format=document.getElementById("version").value;



document.getElementById("previewName").innerHTML =
convertColor(name) || "Pack Name";


document.getElementById("previewDescription").innerHTML =
convertColor(desc) || "Description";





let data={

pack:{

pack_format:Number(format),

description:desc

}

};




document.getElementById("json").textContent =
JSON.stringify(data,null,2);



}






document.getElementById("packName")
.addEventListener("input",update);



document.getElementById("description")
.addEventListener("input",update);



document.getElementById("version")
.addEventListener("change",update);








function downloadMcmeta(){


let content=document.getElementById("json").textContent;



let blob=new Blob(

[content],

{

type:"application/json"

}

);



let link=document.createElement("a");


link.href=URL.createObjectURL(blob);


link.download="pack.mcmeta";


link.click();



}




async function downloadPack(){

    if(!iconData){

        alert("اول آیکون پک را انتخاب کنید");
        return;

    }


    let zip = new JSZip();


    let mcmeta = document.getElementById("json").textContent;


    zip.file("pack.mcmeta", mcmeta);


    let imageData = iconData.split(",")[1];


    zip.file(
        "pack.png",
        imageData,
        {
            base64:true
        }
    );


    let content = await zip.generateAsync({
        type:"blob"
    });


    let link=document.createElement("a");

    link.href=URL.createObjectURL(content);

    link.download="PackZoneMC_Pack.zip";

    link.click();

}
update();

</script>

</body>

</html>

<script>


let iconBase64 = "";

let currentEditor = null;



// انتخاب آیکون


document.getElementById("iconInput")
.addEventListener("change",function(e){


let file=e.target.files[0];


if(file){


let reader=new FileReader();


reader.onload=function(event){


iconBase64=event.target.result;


document.getElementById("iconPreview").src=iconBase64;


document.getElementById("previewIcon").src=iconBase64;


update();


}


reader.readAsDataURL(file);


}

});






// انتخاب ادیتور


document.getElementById("packName")
.onclick=function(){

currentEditor=this;

}



document.getElementById("description")
.onclick=function(){

currentEditor=this;

}






// اضافه کردن کد رنگ


function formatText(code){


if(!currentEditor){

currentEditor=document.getElementById("packName");

}


insertCode(currentEditor,code);


}



function formatDescription(code){


currentEditor=document.getElementById("description");


insertCode(currentEditor,code);


}




function insertCode(editor,code){


editor.innerHTML += code;


editor.focus();


update();


}






// آپدیت


function update(){



let name =
document.getElementById("packName").innerText;



let desc =
document.getElementById("description").innerText;



let format =
document.getElementById("version").value;





document.getElementById("previewName").innerText =
name;



document.getElementById("previewDescription").innerText =
desc;





let data={


pack:{


pack_format:Number(format),


description:desc


}


};





document.getElementById("json").textContent =
JSON.stringify(data,null,2);



}






document.getElementById("packName")
.addEventListener("input",update);



document.getElementById("description")
.addEventListener("input",update);



document.getElementById("version")
.addEventListener("change",update);






// دانلود mcmeta


function downloadMcmeta(){


let text=document.getElementById("json").textContent;


let blob=new Blob(
[text],
{
type:"application/json"
}
);


let a=document.createElement("a");


a.href=URL.createObjectURL(blob);


a.download="pack.mcmeta";


a.click();


}






// ZIP فعلا مرحله بعد کامل میشه


function downloadZip(){


alert("بخش ZIP در مرحله بعد اضافه می‌شود");


}



</script>
<script>

let iconBase64 = "";


// انتخاب آیکون

document.getElementById("iconInput").onchange = function(e){

let file = e.target.files[0];

if(file){

let reader = new FileReader();

reader.onload = function(ev){

iconBase64 = ev.target.result;

document.getElementById("iconPreview").src = iconBase64;

document.getElementById("previewIcon").src = iconBase64;

update();

}

reader.readAsDataURL(file);

}

};




// ادیتور فعال

let activeEditor = null;


document.querySelectorAll(".editor").forEach(function(editor){

editor.onclick=function(){

activeEditor=this;

}

});





// اعمال کد روی متن انتخاب شده

function applyCode(code){


if(!activeEditor){

activeEditor=document.getElementById("packName");

}


let selection = window.getSelection();


if(selection.rangeCount){


let range = selection.getRangeAt(0);


if(!range.collapsed){


let span=document.createElement("span");


span.textContent = code + range.toString();


range.deleteContents();


range.insertNode(span);


}


else{


activeEditor.innerHTML += code;


}


}


update();


}







// وصل کردن دکمه‌ها

document.querySelectorAll(".toolbar button")
.forEach(function(btn){


btn.onclick=function(){


let code=this.innerText;


if(code==="Bold") code="§l";

if(code==="Italic") code="§o";

if(code==="Underline") code="§n";

if(code==="Strike") code="§m";

if(code==="Magic") code="§k";

if(code==="Reset") code="§r";


applyCode(code);


}



});








// تبدیل متن به خروجی Minecraft

function convertMinecraftText(element){


let result="";


element.childNodes.forEach(function(node){


if(node.nodeType===3){


result += node.textContent;


}


else{


result += node.textContent;


}


});


return result;


}








function update(){


let name =
convertMinecraftText(
document.getElementById("packName")
);



let desc =
convertMinecraftText(
document.getElementById("description")
);



let format =
document.getElementById("version").value;





document.getElementById("previewName").textContent =
name || "Pack Name";



document.getElementById("previewDescription").textContent =
desc || "Description";





let json={


pack:{


pack_format:Number(format),


description:desc


}


};





document.getElementById("json").textContent =
JSON.stringify(json,null,2);


}







document.querySelectorAll(".editor")
.forEach(function(e){

e.addEventListener("input",update);

});



document.getElementById("version")
.addEventListener("change",update);









function downloadMcmeta(){


let data =
document.getElementById("json").textContent;



let blob =
new Blob(
[data],
{
type:"application/json"
}
);



let a=document.createElement("a");


a.href=URL.createObjectURL(blob);


a.download="pack.mcmeta";


a.click();


}







function downloadZip(){


alert("ZIP در مرحله بعد اضافه می‌شود");


}



</script>

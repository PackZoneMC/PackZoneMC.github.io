<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackZone MC | ساخت McMeta</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="language-switch">
        <button onclick="changeLanguage('fa')">🇮🇷 FA</button>
        <button onclick="changeLanguage('en')">🇺🇸 EN</button>
    </div>

    <section class="hero">
        <h1 class="main-logo">💙 PackZone MC</h1>
        <a href="index.html" class="home-button">🏠 خانه</a>
        <h2>📄 ساخت McMeta</h2>
        <p>فایل pack.mcmeta رو برای جاوا بساز</p>
    </section>

    <section class="menu-box">

        <div class="card">
            <h2>📦 اطلاعات پک</h2>

            <label>📛 اسم پک (ساده)</label><br>
            <input type="text" id="packName" placeholder="مثلا PZMC Pack"><br><br>

            <h3>🎨 توضیحات رنگی</h3>
            <p>هر بخش رو جداگانه رنگ کن</p>
            <div id="descParts">
                <div class="descPart">
                    <input class="descText" placeholder="مثلا Made By">
                    <select class="descColor">
                        <option value="§f">⚪ سفید</option>
                        <option value="§b">🔵 آبی روشن</option>
                        <option value="§e">🟡 زرد</option>
                        <option value="§a">🟢 سبز</option>
                        <option value="§c">🔴 قرمز</option>
                        <option value="§5">🟣 بنفش</option>
                    </select>
                    <select class="descStyle">
                        <option value="">عادی</option>
                        <option value="§l">ضخیم</option>
                        <option value="§o">کج</option>
                        <option value="§n">زیرخط</option>
                        <option value="§m">خط خورده</option>
                    </select>
                </div>
            </div>
            <button onclick="addDescPart()">➕ اضافه کردن بخش</button>
            <br><br>

            <label>🎮 نسخه ماینکرفت (جاوا)</label><br>
            <select id="mcVersion">
                <option value="1.8.9" selected>1.8.9 🔥 (محبوب PvP)</option>
                <option value="1.12.2">1.12.2</option>
                <option value="1.16.5">1.16.5</option>
                <option value="1.17.1">1.17.1</option>
                <option value="1.18.2">1.18.2</option>
                <option value="1.19.4">1.19.4</option>
                <option value="1.20.4">1.20.4</option>
                <option value="1.21.4">1.21.4 (جدید)</option>
            </select>
        </div>

        <div class="card">
            <h2>🖼 آیکون پک</h2>
            <p>آیکون pack.png رو انتخاب کن</p>
            <input type="file" id="packIcon" accept="image/png" onchange="previewIcon(event)">
            <br><br>
            <img id="iconPreview" width="128" style="display:none; border-radius:15px;">
        </div>

        <div class="card">
            <h2>⚡ ساخت و دانلود</h2>
            <br>
            <button onclick="downloadMcmeta()">⬇️ دانلود pack.mcmeta</button>
            <br><br>
            <button onclick="downloadZip()">📦 دانلود پک کامل (ZIP)</button>
        </div>

    </section>

    <footer>© PackZone MC 💙</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let packIconFile = null;

        function addDescPart() {
            let box = document.createElement("div");
            box.className = "descPart";
            box.innerHTML = `
                <input class="descText" placeholder="متن">
                <select class="descColor">
                    <option value="§f">⚪ سفید</option>
                    <option value="§1">🔷 آبی تیره</option>
                    <option value="§5">🟣 بنفش</option>
                    <option value="§6">🟠 طلایی</option>
                    <option value="§a">🟢 سبز</option>
                    <option value="§b">🔵 آبی روشن</option>
                    <option value="§c">🔴 قرمز</option>
                    <option value="§e">🟡 زرد</option>
                </select>
                <select class="descStyle">
                    <option value="">عادی</option>
                    <option value="§l">ضخیم</option>
                    <option value="§o">کج</option>
                    <option value="§n">زیرخط</option>
                    <option value="§m">خط خورده</option>
                </select>
            `;
            document.getElementById("descParts").appendChild(box);
        }

        function buildColoredText(container, textClass, colorClass, styleClass) {
            let result = "";
            let texts = document.querySelectorAll(container + " " + textClass);
            let colors = document.querySelectorAll(container + " " + colorClass);
            let styles = document.querySelectorAll(container + " " + styleClass);

            for (let i = 0; i < texts.length; i++) {
                if (texts[i].value.trim() !== "") {
                    result += colors[i].value + styles[i].value + texts[i].value;
                }
            }
            return result;
        }

        function getPackFormat(version) {
            const map = {
                '1.8.9': 1,
                '1.12.2': 3,
                '1.16.5': 6,
                '1.17.1': 7,
                '1.18.2': 8,
                '1.19.4': 12,
                '1.20.4': 18,
                '1.21.4': 34
            };
            return map[version] || 1;
        }

        function buildMcmeta() {
            let name = document.getElementById("packName").value.trim();
            let desc = buildColoredText("#descParts", ".descText", ".descColor", ".descStyle");

            if (!name) name = "PackZone Pack";
            if (!desc) desc = "Made by PackZone MC";

            let version = document.getElementById("mcVersion").value;
            let pack_format = getPackFormat(version);

            return {
                pack: {
                    pack_format: pack_format,
                    description: desc
                }
            };
        }

        function getCleanPackName() {
            let name = document.getElementById("packName").value.trim();
            if (!name) name = "PackZone-Pack";
            name = name.replace(/\s+/g, '-');
            name = name.replace(/[^a-zA-Z0-9\-_]/g, '');
            return name;
        }

        function downloadMcmeta() {
            let data = buildMcmeta();
            let json = JSON.stringify(data, null, 4);
            let blob = new Blob([json], { type: "application/json" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "pack.mcmeta";
            link.click();
        }

        function downloadZip() {
            let data = buildMcmeta();
            let json = JSON.stringify(data, null, 4);
            let zip = new JSZip();
            zip.file("pack.mcmeta", json);

            if (packIconFile) {
                zip.file("pack.png", packIconFile);
            } else {
                alert("⚠️ لطفاً یک آیکون آپلود کن!");
                return;
            }

            let zipName = getCleanPackName() + ".zip";

            zip.generateAsync({ type: "blob" }).then(function(content) {
                let link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = zipName;
                link.click();
            });
        }

        function previewIcon(event) {
            let file = event.target.files[0];
            packIconFile = file;
            if (file) {
                let reader = new FileReader();
                reader.onload = function() {
                    let img = document.getElementById("iconPreview");
                    img.src = reader.result;
                    img.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        }
    </script>

</body>

</html>

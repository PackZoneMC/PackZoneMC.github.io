<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackZone MC | Build McMeta</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* استایل بخش‌های رنگی */
        .part-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .part-row input {
            flex: 2;
            min-width: 100px;
        }
        .part-row select {
            flex: 1;
            min-width: 80px;
        }
    </style>
</head>

<body>

    <div class="language-switch">
        <button onclick="changeLanguage('fa')">🇮🇷 FA</button>
        <button onclick="changeLanguage('en')">🇺🇸 EN</button>
    </div>

    <section class="hero">
        <h1 class="main-logo">💙 PackZone MC</h1>
        <a href="index.html" class="home-button">🏠 Home</a>
        <h2>📄 Build McMeta</h2>
        <p>Build your pack.mcmeta file for Java Edition</p>
    </section>

    <section class="menu-box">

        <div class="card">
            <h2>📦 Pack Info</h2>

            <label>📛 Pack Name (simple)</label><br>
            <input type="text" id="packName" placeholder="e.g. PZMC Pack"><br><br>

            <h3>🎨 Colored Description</h3>
            <p>Add each part separately with color & style</p>
            
            <div id="descParts">
                <div class="part-row">
                    <input class="descText" placeholder="e.g. Made By">
                    <select class="descColor">
                        <option value="§f">⚪ White</option>
                        <option value="§b">🔵 Light Blue</option>
                        <option value="§e">🟡 Yellow</option>
                        <option value="§a">🟢 Green</option>
                        <option value="§c">🔴 Red</option>
                        <option value="§5">🟣 Purple</option>
                    </select>
                    <select class="descStyle">
                        <option value="">Normal</option>
                        <option value="§l">Bold</option>
                        <option value="§o">Italic</option>
                        <option value="§n">Underline</option>
                        <option value="§m">Strikethrough</option>
                    </select>
                </div>
            </div>
            <button onclick="addDescPart()">➕ Add Part</button>
            <br><br>

            <label>🎮 Minecraft Version (Java)</label><br>
            <select id="mcVersion">
                <option value="1.8.9" selected>1.8.9 🔥 (PvP Favorite)</option>
                <option value="1.12.2">1.12.2</option>
                <option value="1.16.5">1.16.5</option>
                <option value="1.17.1">1.17.1</option>
                <option value="1.18.2">1.18.2</option>
                <option value="1.19.4">1.19.4</option>
                <option value="1.20.4">1.20.4</option>
                <option value="1.21.4">1.21.4 (Latest)</option>
            </select>
        </div>

        <div class="card">
            <h2>🖼 Pack Icon</h2>
            <p>Choose your pack icon (pack.png)</p>
            <input type="file" id="packIcon" accept="image/png" onchange="previewIcon(event)">
            <br><br>
            <img id="iconPreview" width="128" style="display:none; border-radius:15px;">
        </div>

        <div class="card">
            <h2>⚡ Build & Download</h2>
            <br>
            <button onclick="downloadMcmeta()">⬇️ Download pack.mcmeta</button>
            <br><br>
            <button onclick="downloadZip()">📦 Download Full Pack (ZIP)</button>
        </div>

    </section>

    <footer>© PackZone MC 💙</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let packIconFile = null;

        // ===== اضافه کردن بخش توضیحات =====
        function addDescPart() {
            let box = document.createElement("div");
            box.className = "part-row";
            box.innerHTML = `
                <input class="descText" placeholder="e.g. Text">
                <select class="descColor">
                    <option value="§f">⚪ White</option>
                    <option value="§1">🔷 Dark Blue</option>
                    <option value="§5">🟣 Purple</option>
                    <option value="§6">🟠 Gold</option>
                    <option value="§a">🟢 Green</option>
                    <option value="§b">🔵 Light Blue</option>
                    <option value="§c">🔴 Red</option>
                    <option value="§e">🟡 Yellow</option>
                </select>
                <select class="descStyle">
                    <option value="">Normal</option>
                    <option value="§l">Bold</option>
                    <option value="§o">Italic</option>
                    <option value="§n">Underline</option>
                    <option value="§m">Strikethrough</option>
                </select>
            `;
            document.getElementById("descParts").appendChild(box);
        }

        // ===== ساخت متن رنگی =====
        function buildColoredText(container, textClass, colorClass, styleClass) {
            let result = "";
            let texts = document.querySelectorAll(container + " " + textClass);
            let colors = document.querySelectorAll(container + " " + colorClass);
            let styles = document.querySelectorAll(container + " " + styleClass);

            for (let i = 0; i < texts.length; i++) {
                if (texts[i].value.trim() !== "") {
                    result += colors[i].value + styles[i].value + texts[i].value;
                }
            }
            return result;
        }

        // ===== گرفتن pack_format برای جاوا =====
        function getPackFormat(version) {
            const map = {
                '1.8.9': 1,
                '1.12.2': 3,
                '1.16.5': 6,
                '1.17.1': 7,
                '1.18.2': 8,
                '1.19.4': 12,
                '1.20.4': 18,
                '1.21.4': 34
            };
            return map[version] || 1;
        }

        // ===== ساخت pack.mcmeta =====
        function buildMcmeta() {
            let name = document.getElementById("packName").value.trim();
            let desc = buildColoredText("#descParts", ".descText", ".descColor", ".descStyle");

            if (!name) name = "PackZone Pack";
            if (!desc) desc = "Made by PackZone MC";

            let version = document.getElementById("mcVersion").value;
            let pack_format = getPackFormat(version);

            return {
                pack: {
                    pack_format: pack_format,
                    description: desc
                }
            };
        }

        // ===== گرفتن اسم پاک =====
        function getCleanPackName() {
            let name = document.getElementById("packName").value.trim();
            if (!name) name = "PackZone-Pack";
            name = name.replace(/\s+/g, '-');
            name = name.replace(/[^a-zA-Z0-9\-_]/g, '');
            return name;
        }

        // ===== دانلود mcmeta =====
        function downloadMcmeta() {
            let data = buildMcmeta();
            let json = JSON.stringify(data, null, 4);
            let blob = new Blob([json], { type: "application/json" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "pack.mcmeta";
            link.click();
        }

        // ===== دانلود ZIP =====
        function downloadZip() {
            let data = buildMcmeta();
            let json = JSON.stringify(data, null, 4);
            let zip = new JSZip();
            zip.file("pack.mcmeta", json);

            if (packIconFile) {
                zip.file("pack.png", packIconFile);
            } else {
                alert("⚠️ Please upload a pack icon!");
                return;
            }

            let zipName = getCleanPackName() + ".zip";

            zip.generateAsync({ type: "blob" }).then(function(content) {
                let link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = zipName;
                link.click();
            });
        }

        // ===== پیش‌نمایش آیکون =====
        function previewIcon(event) {
            let file = event.target.files[0];
            packIconFile = file;
            if (file) {
                let reader = new FileReader();
                reader.onload = function() {
                    let img = document.getElementById("iconPreview");
                    img.src = reader.result;
                    img.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        }
    </script>

</body>

</html>

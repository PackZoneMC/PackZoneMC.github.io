<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackZone MC | Build McMeta</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="language-switch">
        <button onclick="changeLanguage('fa')">🇮🇷 FA</button>
        <button onclick="changeLanguage('en')">🇺🇸 EN</button>
    </div>

    <section class="hero">
        <h1 class="main-logo">💙 PackZone MC</h1>
        <a href="index.html" class="home-button">🏠 Home</a>
        <h2>📄 Build McMeta</h2>
        <p>Build your pack.mcmeta file for Java Edition</p>
    </section>

    <section class="menu-box">

        <div class="card">
            <h2>📦 Pack Info</h2>

            <label>📛 Pack Name</label><br>
            <input type="text" id="packName" placeholder="e.g. PZMC Pack"><br><br>

            <label>📝 Description</label><br>
            <textarea id="description" rows="3" placeholder="Pack description"></textarea><br><br>

            <label>🎮 Minecraft Version (Java)</label><br>
            <select id="mcVersion">
                <option value="1.8.9" selected>1.8.9 🔥 (PvP Favorite)</option>
                <option value="1.12.2">1.12.2</option>
                <option value="1.16.5">1.16.5</option>
                <option value="1.17.1">1.17.1</option>
                <option value="1.18.2">1.18.2</option>
                <option value="1.19.4">1.19.4</option>
                <option value="1.20.4">1.20.4</option>
                <option value="1.21.4">1.21.4 (Latest)</option>
            </select>
        </div>

        <div class="card">
            <h2>🖼 Pack Icon</h2>
            <p>Choose your pack icon</p>
            <input type="file" id="packIcon" accept="image/png" onchange="previewIcon(event)">
            <br><br>
            <img id="iconPreview" width="128" style="display:none; border-radius:15px;">
        </div>

        <div class="card">
            <h2>⚡ Build & Download</h2>
            <br>
            <button onclick="downloadMcmeta()">⬇️ Download pack.mcmeta</button>
            <br><br>
            <button onclick="downloadZip()">📦 Download Full Pack (ZIP)</button>
        </div>

    </section>

    <footer>© PackZone MC 💙</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let packIconFile = null;

        function getPackFormat(version) {
            const map = {
                '1.8.9': 1,
                '1.12.2': 3,
                '1.16.5': 6,
                '1.17.1': 7,
                '1.18.2': 8,
                '1.19.4': 12,
                '1.20.4': 18,
                '1.21.4': 34
            };
            return map[version] || 1;
        }

        function buildMcmeta() {
            let name = document.getElementById("packName").value.trim();
            let desc = document.getElementById("description").value.trim();

            if (!name) name = "PackZone Pack";
            if (!desc) desc = "Made by PackZone MC";

            let version = document.getElementById("mcVersion").value;
            let pack_format = getPackFormat(version);

            return {
                pack: {
                    pack_format: pack_format,
                    description: desc
                }
            };
        }

        function getCleanPackName() {
            let name = document.getElementById("packName").value.trim();
            if (!name) name = "PackZone-Pack";
            name = name.replace(/\s+/g, '-');
            name = name.replace(/[^a-zA-Z0-9\-_]/g, '');
            return name;
        }

        function downloadMcmeta() {
            let data = buildMcmeta();
            let json = JSON.stringify(data, null, 4);
            let blob = new Blob([json], { type: "application/json" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "pack.mcmeta";
            link.click();
        }

        function downloadZip() {
            let data = buildMcmeta();
            let json = JSON.stringify(data, null, 4);
            let zip = new JSZip();
            zip.file("pack.mcmeta", json);

            if (packIconFile) {
                zip.file("pack.png", packIconFile);
            } else {
                alert("⚠️ Please upload a pack icon!");
                return;
            }

            let zipName = getCleanPackName() + ".zip";

            zip.generateAsync({ type: "blob" }).then(function(content) {
                let link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = zipName;
                link.click();
            });
        }

        function previewIcon(event) {
            let file = event.target.files[0];
            packIconFile = file;
            if (file) {
                let reader = new FileReader();
                reader.onload = function() {
                    let img = document.getElementById("iconPreview");
                    img.src = reader.result;
                    img.style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        }
    </script>

</body>

</html>
